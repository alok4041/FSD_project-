<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingBot - Forgot Password</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Reset Password</h1>
            <p>Enter your email and a new password</p>
            
            <form id="forgotPasswordForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="reset-password" required placeholder="Enter new password">
                </div>
                
                <p id="error-message" class="error-hidden"></p>
                <p id="success-message" style="color: #2e7d32; font-size: 0.9em; margin-bottom: 15px; display: none;"></p>
                
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>
            
            <div class="toggle-auth">
                <p>Remembered your password? <a href="login.html">Log In here</a></p>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
